<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="720" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221C2E"/>
      <stop offset="100%" stop-color="#120F17"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#B37CFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#B37CFF" stop-opacity="0"/>
